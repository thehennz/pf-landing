version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"        # нужен для получения SSL-сертификата (ACME)
      - "8443:8443"    # сам сайт по HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
